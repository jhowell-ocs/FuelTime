name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security-scan:
    name: Security & Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit[toml] pip-audit pylint flake8 black isort

      - name: Run Black (code formatting check)
        run: black --check --diff .
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Run Flake8 (linting)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run Pylint (code analysis)
        run: pylint app.py --fail-under=7.0
        continue-on-error: true

      - name: Run Bandit (security scanner)
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -f txt || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check dependencies with pip-audit
        run: pip-audit -r requirements.txt --format json --output pip-audit-report.json || true
        continue-on-error: true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      # Generate SARIF format for GitHub Security tab integration
      # Note: Requires GitHub Advanced Security (GHAS) to be enabled for private repos
      # Public repos get code scanning for free (must be enabled in Settings)
      - name: Run Trivy vulnerability scanner (SARIF for GitHub)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail on vulnerabilities found

      # Generate JSON format for artifact fallback (always available)
      - name: Run Trivy vulnerability scanner (JSON for artifacts)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '0'

      # Validate SARIF before attempting upload
      - name: Validate SARIF file
        if: always()
        run: |
          if [ ! -f trivy-results.sarif ]; then
            echo "::error::SARIF file not generated by Trivy"
            exit 1
          fi
          if ! jq empty trivy-results.sarif 2>/dev/null; then
            echo "::error::SARIF file is not valid JSON"
            exit 1
          fi
          echo "SARIF validation passed"
          VERSION=$(jq -r '.version' trivy-results.sarif)
          echo "SARIF schema version: $VERSION"
          RUNS=$(jq '.runs | length' trivy-results.sarif)
          echo "Found $RUNS scan run(s) in SARIF"

      # Upload to GitHub Security tab (requires GHAS for private repos)
      # This step will fail explicitly if GHAS is not enabled
      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-filesystem'

      # Show helpful error message if SARIF upload fails
      - name: SARIF upload troubleshooting
        if: failure()
        run: |
          echo "::warning::❌ SARIF upload failed. This usually means:"
          echo "::warning::  1. GitHub Advanced Security is not enabled (required for private repos)"
          echo "::warning::  2. Code scanning is not set up (Settings → Code security → Set up Code scanning)"
          echo "::warning::  3. Permission issue with security-events token"
          echo "::warning::📚 See: docs/SECURITY_SCANNING_GUIDE.md for setup instructions"
          echo "::warning::💡 Security scan results are still available as downloadable artifacts below"

      # Always upload JSON as artifact fallback
      - name: Upload Trivy JSON results (artifact fallback)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-filesystem-report
          path: trivy-results.json
          retention-days: 90

      # Generate inline summary for Actions tab visibility
      - name: Generate security summary
        if: always()
        run: |
          if [ ! -f trivy-results.json ]; then
            echo "⚠️ Trivy results not found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          echo "# 🔒 Filesystem Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json || echo 0)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json || echo 0)
          LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-results.json || echo 0)
          
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $LOW |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "## 🚨 Critical Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") | "- **\(.VulnerabilityID // "Unknown")** (\(.PkgName // "Unknown")@\(.InstalledVersion // "Unknown")) - \(.Title // "No title")"' trivy-results.json | head -5 >> $GITHUB_STEP_SUMMARY || echo "Could not parse vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi

  docker-build-test:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: fueltime:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container healthcheck test
        run: |
          docker run -d --name fueltime-test -p 5000:5000 fueltime:test
          sleep 30
          curl -f http://localhost:5000/debug/temp || exit 1
          docker logs fueltime-test
          docker stop fueltime-test

      # Scan Docker image for vulnerabilities (SARIF format for GitHub)
      - name: Scan Docker image with Trivy (SARIF for GitHub)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fueltime:test'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      # Scan Docker image (JSON format for artifacts)
      - name: Scan Docker image with Trivy (JSON for artifacts)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'fueltime:test'
          format: 'json'
          output: 'trivy-image-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '0'

      # Validate image SARIF file
      - name: Validate image SARIF file
        if: always()
        run: |
          if [ ! -f trivy-image-results.sarif ]; then
            echo "::error::Image SARIF file not generated"
            exit 1
          fi
          if ! jq empty trivy-image-results.sarif 2>/dev/null; then
            echo "::error::Image SARIF file is invalid JSON"
            exit 1
          fi
          echo "Image SARIF validation passed"

      # Upload image SARIF to GitHub Security tab
      - name: Upload Trivy image SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-container-image'

      # Show helpful error message if upload fails
      - name: Image SARIF upload troubleshooting
        if: failure()
        run: |
          echo "::warning::❌ Image SARIF upload failed. See filesystem scan job for troubleshooting guidance."
          echo "::warning::📚 Refer to: docs/SECURITY_SCANNING_GUIDE.md"

      # Always upload JSON as artifact fallback
      - name: Upload Trivy image JSON results (artifact fallback)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-container-image-report
          path: trivy-image-results.json
          retention-days: 90

      # Generate inline summary for image scan
      - name: Generate image security summary
        if: always()
        run: |
          if [ ! -f trivy-image-results.json ]; then
            echo "⚠️ Image scan results not found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          echo "# 🐳 Container Image Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image-results.json || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-image-results.json || echo 0)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-image-results.json || echo 0)
          LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-image-results.json || echo 0)
          
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low | $LOW |" >> $GITHUB_STEP_SUMMARY

  publish-image:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [security-scan, docker-build-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
